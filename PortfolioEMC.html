<style>
:root{
    --accent:#2563eb;
    --accent-light:#eff6ff;
    --text:#1e293b;
    --text-light:#475569;
    --muted:#64748b;
    --border:#e2e8f0;
    --bg:#ffffff;
    --section:#f8fafc;
    --section-alt:#f1f5f9;
    --radius:12px;
    --shadow:0 4px 6px rgba(0,0,0,.07);
    --shadow-lg:0 10px 15px rgba(0,0,0,.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
}

.container{
    width:min(1080px,92%);
    margin:auto;
}

section{
    padding:72px 0;
    border-bottom:1px solid var(--border);
}

section:last-of-type{
    border-bottom:none;
}

h1,h2,h3,h4{
    line-height:1.3;
    color:var(--text);
}

h1{
    font-size:clamp(2rem,5vw,3.5rem);
    font-weight:800;
    margin-bottom:12px;
}

h2{
    font-size:2rem;
    font-weight:700;
    margin-bottom:32px;
}

h3{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:8px;
}

p{
    color:var(--text-light);
    line-height:1.7;
    margin-bottom:12px;
}

a{
    text-decoration:none;
    color:var(--accent);
}

button{
    cursor:pointer;
}

:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:4px;
    border-radius:6px;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:999;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
}

.nav-inner{
    height:68px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-weight:700;
    font-size:1rem;
    letter-spacing:-0.5px;
}

.nav-links{
    display:flex;
    gap:32px;
    align-items:center;
}

.nav-links a{
    color:var(--text);
    font-weight:500;
    font-size:0.95rem;
    transition:color 200ms ease;
}

.nav-links a:hover{
    color:var(--accent);
}

.resume-btn{
    padding:10px 18px;
    background:var(--accent);
    color:white;
    border-radius:8px;
    font-weight:600;
    border:none;
    transition:background 200ms ease;
}

.resume-btn:hover{
    background:#1d4ed8;
}

.mobile-btn{
    display:none;
    border:none;
    background:none;
    font-size:1.5rem;
    cursor:pointer;
}

/* HERO */
.hero{
    padding-top:60px;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#ecfdf5;
    color:#047857;
    border:1px solid #d1fae5;
    padding:8px 14px;
    border-radius:999px;
    font-size:0.9rem;
    font-weight:500;
    margin-bottom:24px;
}

.dot{
    width:8px;
    height:8px;
    background:#10b981;
    border-radius:50%;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%, 100% { opacity:1; }
    50% { opacity:0.5; }
}

.hero-role{
    color:var(--accent);
    font-size:1.1rem;
    font-weight:700;
    margin-bottom:16px;
    letter-spacing:-0.5px;
}

.hero p{
    max-width:700px;
    font-size:1.05rem;
    line-height:1.8;
    margin-bottom:16px;
}

.hero-actions{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-top:32px;
}

.btn{
    padding:12px 24px;
    border-radius:8px;
    font-weight:600;
    font-size:0.95rem;
    border:none;
    transition:all 200ms ease;
    cursor:pointer;
}

.btn-primary{
    background:var(--accent);
    color:white;
}

.btn-primary:hover{
    background:#1d4ed8;
    transform:translateY(-1px);
    box-shadow:var(--shadow-lg);
}

.btn-secondary{
    border:1.5px solid var(--border);
    color:var(--text);
    background:transparent;
}

.btn-secondary:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-light);
}

.tech-chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:32px;
}

.chip{
    background:var(--accent-light);
    color:var(--accent);
    padding:8px 14px;
    border-radius:8px;
    font-size:0.85rem;
    font-weight:600;
    border:1px solid transparent;
    transition:all 200ms ease;
}

.chip:hover{
    border-color:var(--accent);
}

/* CARDS & GRID */
.grid{
    display:grid;
    gap:24px;
}

.facts{
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    margin-top:24px;
}

.fact{
    background:var(--section);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    text-align:center;
    transition:all 200ms ease;
}

.fact:hover{
    border-color:var(--accent);
    box-shadow:var(--shadow);
}

.skills-grid{
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
}

.skill-card{
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
    background:var(--section);
    transition:all 200ms ease;
}

.skill-card:hover{
    border-color:var(--accent);
    box-shadow:var(--shadow);
    background:var(--bg);
}

.skill-card h3{
    margin-bottom:18px;
    color:var(--accent);
}

.skill-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.skill{
    background:var(--bg);
    border:1px solid var(--border);
    padding:7px 12px;
    border-radius:6px;
    font-size:0.85rem;
    font-weight:500;
    color:var(--text-light);
    transition:all 150ms ease;
    cursor:default;
}

.skill:hover{
    border-color:var(--accent);
    color:var(--accent);
}

.projects{
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
}

.project{
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    transition:all 200ms ease;
}

.project:hover{
    border-color:var(--accent);
    box-shadow:var(--shadow-lg);
    transform:translateY(-2px);
}

.project h3{
    margin-bottom:12px;
    color:var(--accent);
}

.project p{
    font-size:0.95rem;
    margin-bottom:10px;
}

.project p strong{
    color:var(--text);
    font-weight:600;
}

.project-tech{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:18px 0;
}

.tag{
    background:var(--accent-light);
    color:var(--accent);
    padding:6px 10px;
    border-radius:6px;
    font-size:0.8rem;
    font-weight:600;
    border:1px solid transparent;
}

.tag:hover{
    border-color:var(--accent);
}

.project-links{
    display:flex;
    gap:16px;
    margin-top:auto;
    padding-top:18px;
}

.project-links a{
    color:var(--accent);
    font-weight:600;
    font-size:0.95rem;
    transition:color 150ms ease;
}

.project-links a:hover{
    color:#1d4ed8;
}

/* TIMELINE */
.timeline{
    border-left:2px solid var(--accent);
    padding-left:28px;
}

.timeline-item{
    margin-bottom:48px;
    position:relative;
}

.timeline-item::before{
    content:"";
    position:absolute;
    left:-35px;
    top:5px;
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
    border:3px solid var(--bg);
}

.timeline-item h3{
    margin-bottom:4px;
    color:var(--accent);
}

.meta{
    color:var(--muted);
    font-size:0.9rem;
    font-weight:500;
    margin-bottom:8px;
}

.timeline-item ul{
    padding-left:20px;
}

.timeline-item li{
    margin-bottom:6px;
    color:var(--text-light);
    line-height:1.7;
}

.contact-card{
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:32px;
    background:var(--section);
}

.contact-list{
    display:grid;
    gap:16px;
}

.contact-list div{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:0.95rem;
}

.contact-list a{
    color:var(--accent);
    font-weight:600;
    transition:color 150ms ease;
}

.contact-list a:hover{
    color:#1d4ed8;
}

footer{
    border-top:1px solid var(--border);
    padding:40px 0;
    text-align:center;
    color:var(--muted);
    font-size:0.9rem;
}

a:hover,
.btn:hover{
    opacity:1;
}

@media (max-width:768px){
    .mobile-btn{
        display:block;
    }

    .nav-links{
        display:none;
        position:absolute;
        top:68px;
        left:0;
        width:100%;
        background:var(--bg);
        border-bottom:1px solid var(--border);
        flex-direction:column;
        padding:16px 20px;
        gap:0;
    }

    .nav-links a{
        padding:12px 0;
    }

    .nav-links.show{
        display:flex;
    }

    .hero-actions{
        flex-direction:column;
    }

    .btn{
        text-align:center;
        width:100%;
    }

    h2{
        font-size:1.65rem;
        margin-bottom:24px;
    }

    section{
        padding:56px 0;
    }

    .skills-grid,
    .projects{
        grid-template-columns:1fr;
    }

    .tech-chips{
        margin-top:24px;
    }
}

@media (prefers-reduced-motion: reduce){
    *{
        scroll-behavior:auto !important;
        animation:none !important;
        transition:none !important;
    }
}
</style>
</head>

    <div style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px;">${item.institution}</div>
    <div style="color: var(--accent); font-weight: 600; margin-bottom: 8px;">${item.period}</div>
    <div style="color: var(--text-light); font-size: 0.9rem;">${item.score}</div>
  </div>
`).join("");

// Certifications
document.getElementById("certificationsContainer").innerHTML=
DATA.certifications.map(cert=>`
  <div style="margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);">
    <div style="font-weight: 600; color: var(--text); margin-bottom: 2px;">${cert.name}</div>
    <div style="color: var(--muted); font-size: 0.85rem;">${cert.issuer} • ${cert.year}</div>
  </div>
`).join("");

// Achievements
document.getElementById("achievementsContainer").innerHTML=
DATA.achievements.map(ach=>`
  <div style="margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start;">
    <span style="color: var(--accent); margin-top: 4px;">✓</span>
    <span style="color: var(--text-light); font-size: 0.9rem;">${ach}</span>
  </div>
`).join("");

// Contact
document.getElementById("contactList").innerHTML=`
  <div><strong>📧 Email:</strong> <a href="mailto:${DATA.personal.email}">${DATA.personal.email}</a></div>
  <div><strong>📱 Phone:</strong> ${DATA.personal.phone}</div>
  <div><strong>🔗 LinkedIn:</strong> <a href="${DATA.personal.linkedin}" target="_blank">Profile</a></div>
  <div><strong>💻 GitHub:</strong> <a href="${DATA.personal.github}" target="_blank">Profile</a></div>
  <div><strong>🌐 Portfolio:</strong> <a href="${DATA.personal.portfolio}" target="_blank">Visit</a></div>
`;

// Footer
document.getElementById("footerText").textContent =
`© ${new Date().getFullYear()} ${DATA.personal.name} · AI Full Stack Developer`;

// Mobile Menu
document.getElementById("menuBtn").addEventListener("click",()=>{
  document.getElementById("navLinks").classList.toggle("show");
});
</script>

</body>
</html>
